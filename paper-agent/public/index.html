<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paper Reading Agent</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --panel: #ffffff;
        --ink: #17181c;
        --muted: #6b7280;
        --border: #e6e8ef;
        --accent: #4f46e5;
        --accent-soft: #eef0ff;
        --accent-ink: #ffffff;
        --user: #eef0ff;
        --cite: #f2f4f8;
        --danger: #dc2626;
        --ok: #059669;
        --shadow: 0 1px 3px rgba(16, 18, 25, 0.06), 0 8px 24px rgba(16, 18, 25, 0.05);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1015;
          --panel: #171a22;
          --ink: #e9eaee;
          --muted: #9aa1ad;
          --border: #272c38;
          --accent: #6d67f0;
          --accent-soft: #232748;
          --accent-ink: #ffffff;
          --user: #222642;
          --cite: #1d212b;
          --danger: #f87171;
          --ok: #34d399;
          --shadow: 0 1px 3px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.3);
        }
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      .view { display: none; min-height: 100vh; }
      .view.active { display: flex; flex-direction: column; }

      /* ============ 首頁 ============ */
      .home-wrap { max-width: 980px; width: 100%; margin: 0 auto; padding: 48px 24px 80px; }
      .hero { text-align: center; padding: 36px 0 30px; }
      .hero .logo { font-size: 44px; }
      .hero h1 { font-size: 32px; margin: 12px 0 10px; letter-spacing: -0.02em; }
      .hero p.tagline { color: var(--muted); font-size: 16px; margin: 0 0 8px; line-height: 1.6; }
      .hero .stats { color: var(--muted); font-size: 13.5px; margin-bottom: 26px; }
      .hero .stats b { color: var(--ink); }
      .cta {
        display: inline-block; font-size: 16px; font-weight: 700; text-decoration: none;
        background: var(--accent); color: var(--accent-ink); border-radius: 12px;
        padding: 13px 34px; box-shadow: var(--shadow); transition: transform .12s ease, opacity .12s ease;
      }
      .cta:hover { transform: translateY(-1px); opacity: .93; }

      .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 40px 0 14px; }

      /* 上傳 */
      .upload-card {
        background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
        padding: 18px; box-shadow: var(--shadow);
      }
      .upload-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
      .upload-btn {
        display: inline-block; cursor: pointer; font-size: 14px; font-weight: 600;
        border: 1.5px dashed var(--accent); color: var(--accent); background: var(--accent-soft);
        border-radius: 10px; padding: 10px 18px;
      }
      .upload-btn input { display: none; }
      #uploadHint { color: var(--muted); font-size: 13px; }
      .progress-wrap { margin-top: 14px; display: none; }
      .progress-label { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--muted); margin-bottom: 6px; }
      .progress-track { height: 8px; border-radius: 999px; background: var(--cite); overflow: hidden; }
      .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: var(--accent); transition: width .15s ease; }
      .progress-fill.indeterminate {
        width: 35% !important; animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }
      #uploadResult { margin-top: 10px; font-size: 13px; line-height: 1.5; }
      #uploadResult.ok { color: var(--ok); }
      #uploadResult.err { color: var(--danger); }

      /* 論文卡片 */
      .papers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
      .paper-card {
        background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
        padding: 16px; box-shadow: var(--shadow); position: relative; cursor: pointer;
        transition: transform .12s ease;
      }
      .paper-card:hover { transform: translateY(-2px); }
      .paper-card h3 { font-size: 14.5px; margin: 0 26px 8px 0; line-height: 1.45; }
      .paper-card .summary {
        font-size: 13px; color: var(--muted); line-height: 1.6; white-space: pre-wrap;
        display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
      }
      .paper-card.expanded .summary { display: block; -webkit-line-clamp: unset; }
      .paper-card .expand-hint { font-size: 12px; color: var(--accent); margin-top: 8px; }
      .paper-card .del {
        position: absolute; top: 10px; right: 10px; border: none; background: transparent;
        color: var(--muted); font-size: 15px; cursor: pointer; padding: 4px 7px; border-radius: 7px; line-height: 1;
      }
      .paper-card .del:hover { color: var(--danger); background: var(--cite); }

      /* ============ 聊天室 ============ */
      .chat-top {
        display: flex; align-items: center; gap: 12px; padding: 12px 18px;
        background: var(--panel); border-bottom: 1px solid var(--border);
      }
      .chat-top .back { text-decoration: none; color: var(--accent); font-size: 14px; font-weight: 600; }
      .chat-top h1 { font-size: 15px; margin: 0; flex: 1; }
      .chat-top button {
        font: inherit; font-size: 13px; border: 1px solid var(--border); background: transparent;
        color: var(--muted); border-radius: 8px; padding: 6px 12px; cursor: pointer;
      }
      .chat-top button:hover { color: var(--danger); border-color: var(--danger); }
      #log { flex: 1; overflow-y: auto; padding: 26px 20px; display: flex; flex-direction: column; gap: 18px; }
      .msg { max-width: 780px; width: fit-content; }
      .msg .role { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
      .bubble {
        padding: 12px 15px; border-radius: 14px; border: 1px solid var(--border);
        white-space: pre-wrap; line-height: 1.6; font-size: 14.5px; background: var(--panel);
        box-shadow: var(--shadow);
      }
      .msg.user { align-self: flex-end; }
      .msg.user .bubble { background: var(--user); }
      .msg.user .role { text-align: right; }
      .cursor { display: inline-block; width: 8px; height: 15px; background: var(--accent); vertical-align: -2px; animation: blink .85s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .cites { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 6px; }
      .cite {
        font-size: 11.5px; background: var(--cite); border: 1px solid var(--border);
        border-radius: 999px; padding: 3px 10px; color: var(--muted);
      }
      .empty { color: var(--muted); font-size: 14px; margin: auto; text-align: center; max-width: 460px; line-height: 2; }
      .empty .ex {
        display: inline-block; background: var(--panel); border: 1px solid var(--border); border-radius: 9px;
        padding: 6px 12px; margin: 4px; cursor: pointer; font-size: 13px; color: var(--ink);
      }
      .empty .ex:hover { border-color: var(--accent); color: var(--accent); }
      #chatForm { border-top: 1px solid var(--border); padding: 14px 18px; display: flex; gap: 10px; background: var(--panel); }
      textarea {
        flex: 1; resize: none; font: inherit; padding: 11px 13px; border: 1px solid var(--border);
        border-radius: 11px; background: var(--bg); color: var(--ink); min-height: 46px; max-height: 170px;
      }
      textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
      #send {
        font: inherit; font-weight: 700; border: none; border-radius: 11px; padding: 0 20px;
        background: var(--accent); color: var(--accent-ink); cursor: pointer;
      }
      #send:disabled { opacity: .5; cursor: default; }
    </style>
  </head>
  <body>
    <!-- ============ 首頁 ============ -->
    <div id="view-home" class="view">
      <div class="home-wrap">
        <div class="hero">
          <div class="logo">📄</div>
          <h1>Paper Reading Agent</h1>
          <p class="tagline">上傳論文、自動摘要、提問即得附引用的答案 —— 你的人臉辨識文獻助手</p>
          <div class="stats">已收錄 <b id="paperCount">–</b> 篇論文 · OpenAI + Cloudflare Vectorize</div>
          <a class="cta" href="#/chat">進入聊天室 →</a>
        </div>

        <div class="section-title">新增論文</div>
        <div class="upload-card">
          <div class="upload-row">
            <label class="upload-btn">
              選擇 PDF 上傳
              <input type="file" id="file" accept="application/pdf" />
            </label>
            <span id="uploadHint">上傳後會自動解析、嵌入並生成繁體中文摘要</span>
          </div>
          <div class="progress-wrap" id="progressWrap">
            <div class="progress-label"><span id="progressPhase">上傳中</span><span id="progressPct"></span></div>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          </div>
          <div id="uploadResult"></div>
        </div>

        <div class="section-title">論文庫</div>
        <div class="papers-grid" id="papersGrid"></div>
      </div>
    </div>

    <!-- ============ 聊天室 ============ -->
    <div id="view-chat" class="view">
      <div class="chat-top">
        <a class="back" href="#/">← 首頁</a>
        <h1>📄 Paper Reading Agent</h1>
        <button id="clearChat" type="button">清除對話</button>
      </div>
      <div id="log"></div>
      <form id="chatForm">
        <textarea id="input" placeholder="輸入問題… (Enter 送出，Shift+Enter 換行)"></textarea>
        <button type="submit" id="send">送出</button>
      </form>
    </div>

    <script>
      // ---------- 工具 ----------
      const $ = (id) => document.getElementById(id);
      const esc = (s) => s.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      // 後備保險：模型被指示輸出純文字，這裡再剝掉常見殘留 Markdown 符號
      function stripMarkdown(s) {
        return s
          .replace(/\*\*([^*]+)\*\*/g, "$1")
          .replace(/__([^_]+)__/g, "$1")
          .replace(/(^|\s)\*([^*\n]+)\*(?=\s|$)/g, "$1$2")
          .replace(/^#{1,6}\s+/gm, "")
          .replace(/`([^`]+)`/g, "$1")
          .replace(/^\s*[-*]\s+/gm, "• ");
      }

      // ---------- Hash 路由 ----------
      const views = { home: $("view-home"), chat: $("view-chat") };
      function route() {
        const isChat = location.hash.startsWith("#/chat");
        views.home.classList.toggle("active", !isChat);
        views.chat.classList.toggle("active", isChat);
        if (isChat) $("input").focus();
      }
      window.addEventListener("hashchange", route);

      // ---------- 首頁：論文庫 ----------
      async function loadPapers() {
        try {
          const res = await fetch("/papers");
          const data = await res.json();
          const papers = data.papers || [];
          $("paperCount").textContent = papers.length;
          $("papersGrid").innerHTML =
            papers
              .map(
                (p) => `
              <div class="paper-card" data-file="${esc(p.file)}">
                <button class="del" title="刪除這篇論文">✕</button>
                <h3>${esc(p.title)}</h3>
                <div class="summary">${esc(p.summary || "（尚無摘要 — 重新匯入後會自動生成）")}</div>
                <div class="expand-hint">點擊展開/收合摘要</div>
              </div>`
              )
              .join("") || '<div style="color:var(--muted);font-size:14px">尚未收錄任何論文，先上傳一篇吧。</div>';

          for (const card of document.querySelectorAll(".paper-card")) {
            card.addEventListener("click", () => card.classList.toggle("expanded"));
            card.querySelector(".del").addEventListener("click", async (e) => {
              e.stopPropagation();
              const file = card.dataset.file;
              if (!confirm(`確定要刪除「${card.querySelector("h3").textContent}」？\n向量與摘要都會移除，無法復原。`)) return;
              try {
                const res = await fetch("/papers/" + encodeURIComponent(file), { method: "DELETE" });
                const out = await res.json();
                if (!res.ok) throw new Error(out.error || "delete failed");
                loadPapers();
              } catch (err) {
                alert("刪除失敗：" + err.message);
              }
            });
          }
        } catch {
          $("papersGrid").innerHTML = '<div style="color:var(--danger)">無法載入論文清單</div>';
        }
      }

      // ---------- 首頁：上傳（XHR 進度條） ----------
      $("file").addEventListener("change", () => {
        const file = $("file").files[0];
        if (!file) return;
        const wrap = $("progressWrap"), fill = $("progressFill"),
              phase = $("progressPhase"), pct = $("progressPct"), result = $("uploadResult");
        wrap.style.display = "block";
        fill.classList.remove("indeterminate");
        fill.style.width = "0%";
        phase.textContent = "上傳中";
        pct.textContent = "0%";
        result.textContent = "";
        result.className = "";

        const fd = new FormData();
        fd.append("file", file);
        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/ingest");
        xhr.upload.onprogress = (e) => {
          if (!e.lengthComputable) return;
          const p = Math.round((e.loaded / e.total) * 100);
          fill.style.width = p + "%";
          pct.textContent = p + "%";
          if (p >= 100) {
            phase.textContent = "解析與嵌入中…（生成摘要需要一點時間）";
            pct.textContent = "";
            fill.classList.add("indeterminate");
          }
        };
        xhr.onload = () => {
          wrap.style.display = "none";
          fill.classList.remove("indeterminate");
          try {
            const data = JSON.parse(xhr.responseText);
            if (xhr.status !== 200) throw new Error(data.error || "ingest failed");
            result.className = "ok";
            result.textContent = `✓ 已加入「${data.title}」（${data.added} 個片段）` +
              (data.summary ? `\n摘要：${data.summary.slice(0, 120)}…` : "");
            loadPapers();
          } catch (err) {
            result.className = "err";
            result.textContent = "✗ " + err.message;
          }
          $("file").value = "";
        };
        xhr.onerror = () => {
          wrap.style.display = "none";
          result.className = "err";
          result.textContent = "✗ 網路錯誤，請重試";
          $("file").value = "";
        };
        xhr.send(fd);
      });

      // ---------- 聊天室 ----------
      const HISTORY_KEY = "paper-agent-history";
      let history = [];
      try { history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch {}

      function saveHistory() {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(-20)));
      }

      function addMessage(role, text, citations) {
        const empty = $("log").querySelector(".empty");
        if (empty) empty.remove();
        const wrap = document.createElement("div");
        wrap.className = "msg " + role;
        wrap.innerHTML = `<div class="role">${role === "user" ? "你" : "Agent"}</div><div class="bubble"></div>`;
        wrap.querySelector(".bubble").textContent = text;
        if (citations && citations.length) attachCitations(wrap, citations);
        $("log").appendChild(wrap);
        $("log").scrollTop = $("log").scrollHeight;
        return wrap;
      }

      function attachCitations(msgEl, citations) {
        const div = document.createElement("div");
        div.className = "cites";
        div.innerHTML = citations.map((c) => `<span class="cite">${esc(c.title)} · p.${c.page}</span>`).join("");
        msgEl.appendChild(div);
      }

      function showEmptyState() {
        $("log").innerHTML = `
          <div class="empty">
            問任何關於論文庫的問題，回答會附上出處（論文 + 頁碼）<br />
            <span class="ex">EU AI Act 如何規範即時人臉辨識？</span>
            <span class="ex">比較各篇論文對隱私與偏見的立場</span>
            <span class="ex">FaceNet 在 LFW 的準確率是多少？</span>
          </div>`;
        for (const ex of document.querySelectorAll(".ex")) {
          ex.addEventListener("click", () => { $("input").value = ex.textContent; $("input").focus(); });
        }
      }

      function restoreChat() {
        if (history.length === 0) { showEmptyState(); return; }
        for (const m of history) addMessage(m.role, m.content, m.citations);
      }

      $("clearChat").addEventListener("click", () => {
        if (history.length && !confirm("確定清除整段對話？")) return;
        history = [];
        localStorage.removeItem(HISTORY_KEY);
        showEmptyState();
      });

      // SSE 解析：讀取 /chat 的 event-stream，逐事件回呼
      async function readSse(res, handlers) {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const events = buf.split("\n\n");
          buf = events.pop() || "";
          for (const evt of events) {
            let name = "message", data = "";
            for (const line of evt.split("\n")) {
              if (line.startsWith("event:")) name = line.slice(6).trim();
              else if (line.startsWith("data:")) data += line.slice(5).trim();
            }
            if (data && handlers[name]) handlers[name](JSON.parse(data));
          }
        }
      }

      $("chatForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = $("input").value.trim();
        if (!message) return;
        addMessage("user", message);
        history.push({ role: "user", content: message });
        saveHistory();
        $("input").value = "";
        $("send").disabled = true;

        const msgEl = addMessage("assistant", "");
        const bubble = msgEl.querySelector(".bubble");
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        bubble.appendChild(cursor);

        let answer = "";
        let citations = [];
        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              message,
              // 只送 role/content（本地另存 citations 供還原畫面，不可傳給模型）
              history: history.slice(-8, -1).map((m) => ({ role: m.role, content: m.content })),
            }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || "request failed (" + res.status + ")");
          }
          await readSse(res, {
            meta: (d) => { citations = d.citations || []; },
            delta: (d) => {
              answer += d.text;
              bubble.textContent = stripMarkdown(answer);
              bubble.appendChild(cursor);
              $("log").scrollTop = $("log").scrollHeight;
            },
            error: (d) => { throw new Error(d.message || "stream error"); },
          });
          cursor.remove();
          bubble.textContent = stripMarkdown(answer) || "（沒有收到回答）";
          if (citations.length) attachCitations(msgEl, citations);
          history.push({ role: "assistant", content: stripMarkdown(answer), citations });
          saveHistory();
        } catch (err) {
          cursor.remove();
          bubble.textContent = "錯誤：" + err.message;
        } finally {
          $("send").disabled = false;
          $("input").focus();
        }
      });

      $("input").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          $("chatForm").requestSubmit();
        }
      });

      // ---------- 啟動 ----------
      route();
      restoreChat();
      loadPapers();
    </script>
  </body>
</html>
