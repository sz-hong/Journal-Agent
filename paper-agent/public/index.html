<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paper Reading Agent</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --panel: #ffffff;
        --ink: #17181c;
        --muted: #6b7280;
        --border: #e6e8ef;
        --accent: #4f46e5;
        --accent-soft: #eef0ff;
        --accent-ink: #ffffff;
        --user: #eef0ff;
        --cite: #f2f4f8;
        --danger: #dc2626;
        --ok: #059669;
        --shadow: 0 1px 3px rgba(16, 18, 25, 0.06), 0 8px 24px rgba(16, 18, 25, 0.05);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1015;
          --panel: #171a22;
          --ink: #e9eaee;
          --muted: #9aa1ad;
          --border: #272c38;
          --accent: #6d67f0;
          --accent-soft: #232748;
          --accent-ink: #ffffff;
          --user: #222642;
          --cite: #1d212b;
          --danger: #f87171;
          --ok: #34d399;
          --shadow: 0 1px 3px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.3);
        }
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      .view { display: none; min-height: 100vh; }
      .view.active { display: flex; flex-direction: column; }
      .wrap { max-width: 980px; width: 100%; margin: 0 auto; padding: 40px 24px 80px; }
      .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 36px 0 14px; }
      .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 18px; box-shadow: var(--shadow); }
      .btn {
        display: inline-block; font: inherit; font-size: 14.5px; font-weight: 700; text-decoration: none; text-align: center;
        background: var(--accent); color: var(--accent-ink); border: none; border-radius: 11px;
        padding: 11px 24px; cursor: pointer; box-shadow: var(--shadow); transition: transform .12s ease, opacity .12s ease;
      }
      .btn:hover { transform: translateY(-1px); opacity: .93; }
      .btn.ghost { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); box-shadow: none; }
      .btn.danger { background: transparent; color: var(--danger); border: 1.5px solid var(--danger); box-shadow: none; }
      .btn.small { font-size: 13px; padding: 7px 14px; border-radius: 9px; }

      /* ============ 入口頁 ============ */
      .hero { text-align: center; padding: 46px 0 30px; }
      .hero .logo { font-size: 46px; }
      .hero h1 { font-size: 32px; margin: 12px 0 10px; letter-spacing: -0.02em; }
      .hero p { color: var(--muted); font-size: 16px; margin: 0 0 28px; line-height: 1.7; }
      .session-item {
        display: flex; align-items: center; gap: 12px; padding: 13px 16px; margin-bottom: 8px;
        background: var(--panel); border: 1px solid var(--border); border-radius: 12px; cursor: pointer;
      }
      .session-item:hover { border-color: var(--accent); }
      .session-item .name { flex: 1; font-size: 14px; font-weight: 600; }
      .session-item .sid { font-size: 11.5px; color: var(--muted); font-family: ui-monospace, monospace; }
      .session-item .forget { border: none; background: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 4px; }
      .session-item .forget:hover { color: var(--danger); }
      .join-row { display: flex; gap: 10px; margin-top: 10px; }
      .join-row input {
        flex: 1; font: inherit; font-size: 13.5px; padding: 10px 13px; border: 1px solid var(--border);
        border-radius: 10px; background: var(--panel); color: var(--ink);
      }

      /* ============ Session 主頁 ============ */
      .top-bar {
        display: flex; align-items: center; gap: 12px; padding: 12px 18px;
        background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap;
      }
      .top-bar .back { text-decoration: none; color: var(--accent); font-size: 14px; font-weight: 600; white-space: nowrap; }
      .top-bar .title { font-size: 15px; font-weight: 700; flex: 1; min-width: 120px; }
      .top-bar .sid-chip {
        font-size: 11.5px; color: var(--muted); font-family: ui-monospace, monospace;
        background: var(--cite); border-radius: 999px; padding: 4px 11px;
      }
      .chat-list { display: flex; flex-direction: column; gap: 8px; }
      .chat-item {
        display: flex; align-items: center; gap: 12px; padding: 13px 16px;
        background: var(--panel); border: 1px solid var(--border); border-radius: 12px; cursor: pointer;
      }
      .chat-item:hover { border-color: var(--accent); }
      .chat-item .t { flex: 1; font-size: 14px; font-weight: 600; }
      .chat-item .time { font-size: 11.5px; color: var(--muted); }
      .chat-item .x { border: none; background: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 4px; }
      .chat-item .x:hover { color: var(--danger); }

      .upload-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
      .upload-btn {
        display: inline-block; cursor: pointer; font-size: 14px; font-weight: 600;
        border: 1.5px dashed var(--accent); color: var(--accent); background: var(--accent-soft);
        border-radius: 10px; padding: 10px 18px;
      }
      .upload-btn input { display: none; }
      #uploadHint { color: var(--muted); font-size: 13px; }
      .progress-wrap { margin-top: 14px; display: none; }
      .progress-label { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--muted); margin-bottom: 6px; }
      .progress-track { height: 8px; border-radius: 999px; background: var(--cite); overflow: hidden; }
      .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: var(--accent); transition: width .15s ease; }
      .progress-fill.indeterminate { width: 35% !important; animation: slide 1.1s ease-in-out infinite; }
      @keyframes slide { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }
      #uploadResult { margin-top: 10px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
      #uploadResult.ok { color: var(--ok); }
      #uploadResult.err { color: var(--danger); }

      .papers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
      .paper-card { position: relative; cursor: pointer; transition: transform .12s ease; }
      .paper-card:hover { transform: translateY(-2px); }
      .paper-card h3 { font-size: 14.5px; margin: 0 26px 8px 0; line-height: 1.45; }
      .paper-card .summary {
        font-size: 13px; color: var(--muted); line-height: 1.6; white-space: pre-wrap;
        display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
      }
      .paper-card.expanded .summary { display: block; -webkit-line-clamp: unset; }
      .paper-card .expand-hint { font-size: 12px; color: var(--accent); margin-top: 8px; }
      .paper-card .del {
        position: absolute; top: 10px; right: 10px; border: none; background: transparent;
        color: var(--muted); font-size: 15px; cursor: pointer; padding: 4px 7px; border-radius: 7px; line-height: 1;
      }
      .paper-card .del:hover { color: var(--danger); background: var(--cite); }
      .danger-zone { margin-top: 44px; text-align: center; }

      /* ============ 聊天室 ============ */
      #log { flex: 1; overflow-y: auto; padding: 26px 20px; display: flex; flex-direction: column; gap: 18px; }
      .msg { max-width: 780px; width: fit-content; }
      .msg .role { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
      .bubble {
        padding: 12px 15px; border-radius: 14px; border: 1px solid var(--border);
        white-space: pre-wrap; line-height: 1.6; font-size: 14.5px; background: var(--panel);
        box-shadow: var(--shadow);
      }
      .msg.user { align-self: flex-end; }
      .msg.user .bubble { background: var(--user); }
      .msg.user .role { text-align: right; }
      .cursor { display: inline-block; width: 8px; height: 15px; background: var(--accent); vertical-align: -2px; animation: blink .85s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .cites { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 6px; }
      .cite { font-size: 11.5px; background: var(--cite); border: 1px solid var(--border); border-radius: 999px; padding: 3px 10px; color: var(--muted); }
      .empty { color: var(--muted); font-size: 14px; margin: auto; text-align: center; max-width: 460px; line-height: 2; }
      #chatForm { border-top: 1px solid var(--border); padding: 14px 18px; display: flex; gap: 10px; background: var(--panel); }
      textarea {
        flex: 1; resize: none; font: inherit; padding: 11px 13px; border: 1px solid var(--border);
        border-radius: 11px; background: var(--bg); color: var(--ink); min-height: 46px; max-height: 170px;
      }
      textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
      #send {
        font: inherit; font-weight: 700; border: none; border-radius: 11px; padding: 0 20px;
        background: var(--accent); color: var(--accent-ink); cursor: pointer;
      }
      #send:disabled { opacity: .5; cursor: default; }
    </style>
  </head>
  <body>
    <!-- ============ 入口頁 #/ ============ -->
    <div id="view-entry" class="view">
      <div class="wrap">
        <div class="hero">
          <div class="logo">📄</div>
          <h1>Paper Reading Agent</h1>
          <p>建立自己的論文空間：上傳 PDF、自動摘要、多個聊天室、附引用的問答。<br />每個 Session 彼此獨立，可用連結分享。</p>
          <button class="btn" id="newSession">＋ 建立新 Session</button>
        </div>

        <div class="section-title">我的 Sessions</div>
        <div id="sessionList"></div>

        <div class="section-title">加入既有 Session</div>
        <div class="card">
          <div style="font-size:13px;color:var(--muted)">貼上別人分享的連結或 Session ID：</div>
          <div class="join-row">
            <input id="joinInput" placeholder="https://…/#/s/xxxx 或 session id" />
            <button class="btn small" id="joinBtn">加入</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ============ Session 主頁 #/s/{sid} ============ -->
    <div id="view-session" class="view">
      <div class="top-bar">
        <a class="back" href="#/">← 所有 Sessions</a>
        <span class="title">📄 Session</span>
        <span class="sid-chip" id="sidChip"></span>
        <button class="btn small ghost" id="shareBtn">複製分享連結</button>
      </div>
      <div class="wrap">
        <div class="section-title">聊天室</div>
        <div class="chat-list" id="chatList"></div>
        <div style="margin-top:12px">
          <button class="btn small" id="newChatBtn">＋ 新增聊天室</button>
        </div>

        <div class="section-title">新增論文</div>
        <div class="card">
          <div class="upload-row">
            <label class="upload-btn">
              選擇 PDF 上傳
              <input type="file" id="file" accept="application/pdf" />
            </label>
            <span id="uploadHint">上傳後會自動解析、嵌入並生成繁體中文摘要</span>
          </div>
          <div class="progress-wrap" id="progressWrap">
            <div class="progress-label"><span id="progressPhase">上傳中</span><span id="progressPct"></span></div>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          </div>
          <div id="uploadResult"></div>
        </div>

        <div class="section-title">論文庫（<span id="paperCount">0</span> 篇）</div>
        <div class="papers-grid" id="papersGrid"></div>

        <div class="danger-zone">
          <button class="btn danger small" id="deleteSession">刪除整個 Session（論文與聊天記錄全部移除）</button>
        </div>
      </div>
    </div>

    <!-- ============ 聊天室 #/s/{sid}/c/{chatId} ============ -->
    <div id="view-chat" class="view">
      <div class="top-bar">
        <a class="back" id="backToSession" href="#/">← 返回 Session</a>
        <span class="title" id="chatTitle">對話</span>
        <button class="btn small danger" id="deleteChatBtn">刪除聊天室</button>
      </div>
      <div id="log"></div>
      <form id="chatForm">
        <textarea id="input" placeholder="輸入問題… (Enter 送出，Shift+Enter 換行)"></textarea>
        <button type="submit" id="send">送出</button>
      </form>
    </div>

    <script>
      // ---------- 工具 ----------
      const $ = (id) => document.getElementById(id);
      const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      const uuid = () => crypto.randomUUID();
      function stripMarkdown(s) {
        return s
          .replace(/\*\*([^*]+)\*\*/g, "$1")
          .replace(/__([^_]+)__/g, "$1")
          .replace(/(^|\s)\*([^*\n]+)\*(?=\s|$)/g, "$1$2")
          .replace(/^#{1,6}\s+/gm, "")
          .replace(/`([^`]+)`/g, "$1")
          .replace(/^\s*[-*]\s+/gm, "• ");
      }
      function timeAgo(ts) {
        if (!ts) return "";
        const m = Math.floor((Date.now() - ts) / 60000);
        if (m < 1) return "剛剛";
        if (m < 60) return `${m} 分鐘前`;
        if (m < 1440) return `${Math.floor(m / 60)} 小時前`;
        return `${Math.floor(m / 1440)} 天前`;
      }

      // ---------- 已知 session 清單（localStorage 只記「我去過哪些」） ----------
      const SESSIONS_KEY = "paper-agent-sessions";
      function knownSessions() {
        try { return JSON.parse(localStorage.getItem(SESSIONS_KEY)) || []; } catch { return []; }
      }
      function rememberSession(id) {
        const list = knownSessions().filter((s) => s.id !== id);
        list.unshift({ id, lastUsed: Date.now() });
        localStorage.setItem(SESSIONS_KEY, JSON.stringify(list.slice(0, 30)));
      }
      function forgetSession(id) {
        localStorage.setItem(SESSIONS_KEY, JSON.stringify(knownSessions().filter((s) => s.id !== id)));
      }

      // ---------- 路由 ----------
      let SID = null, CHAT_ID = null;
      const views = { entry: $("view-entry"), session: $("view-session"), chat: $("view-chat") };
      function route() {
        const m = location.hash.match(/^#\/s\/([A-Za-z0-9-]{8,64})(?:\/c\/([A-Za-z0-9-]{1,64}))?/);
        SID = m ? m[1] : null;
        CHAT_ID = m && m[2] ? m[2] : null;
        views.entry.classList.toggle("active", !SID);
        views.session.classList.toggle("active", !!SID && !CHAT_ID);
        views.chat.classList.toggle("active", !!SID && !!CHAT_ID);
        if (!SID) {
          renderSessionList();
        } else {
          rememberSession(SID);
          if (CHAT_ID) enterChat();
          else enterSession();
        }
      }
      window.addEventListener("hashchange", route);

      // ---------- 入口頁 ----------
      function renderSessionList() {
        const list = knownSessions();
        $("sessionList").innerHTML =
          list
            .map(
              (s) => `
            <div class="session-item" data-id="${esc(s.id)}">
              <span class="name">Session</span>
              <span class="sid">${esc(s.id.slice(0, 13))}…</span>
              <span class="sid">${timeAgo(s.lastUsed)}</span>
              <button class="forget" title="從此裝置移除（不刪伺服器資料）">✕</button>
            </div>`
            )
            .join("") ||
          '<div style="color:var(--muted);font-size:14px">還沒有任何 Session — 建立一個開始吧。</div>';
        for (const item of document.querySelectorAll(".session-item")) {
          item.addEventListener("click", () => (location.hash = `#/s/${item.dataset.id}`));
          item.querySelector(".forget").addEventListener("click", (e) => {
            e.stopPropagation();
            forgetSession(item.dataset.id);
            renderSessionList();
          });
        }
      }
      $("newSession").addEventListener("click", () => {
        location.hash = `#/s/${uuid()}`;
      });
      $("joinBtn").addEventListener("click", () => {
        const raw = $("joinInput").value.trim();
        const m = raw.match(/([A-Za-z0-9-]{8,64})\s*$/);
        if (!m) { alert("看不懂這個連結或 ID"); return; }
        location.hash = `#/s/${m[1]}`;
      });

      // ---------- Session 主頁 ----------
      async function enterSession() {
        $("sidChip").textContent = SID.slice(0, 13) + "…";
        loadChats();
        loadPapers();
      }

      $("shareBtn").addEventListener("click", async () => {
        const url = `${location.origin}/#/s/${SID}`;
        try {
          await navigator.clipboard.writeText(url);
          $("shareBtn").textContent = "已複製 ✓";
          setTimeout(() => ($("shareBtn").textContent = "複製分享連結"), 1500);
        } catch {
          prompt("複製這個連結：", url);
        }
      });

      async function loadChats() {
        try {
          const res = await fetch(`/s/${SID}/chats`);
          const data = await res.json();
          const chats = data.chats || [];
          $("chatList").innerHTML =
            chats
              .map(
                (c) => `
              <div class="chat-item" data-id="${esc(c.id)}">
                <span class="t">💬 ${esc(c.title)}</span>
                <span class="time">${timeAgo(c.updatedAt)}</span>
                <button class="x" title="刪除聊天室">✕</button>
              </div>`
              )
              .join("") ||
            '<div style="color:var(--muted);font-size:14px">還沒有聊天室 — 開一間來提問吧。</div>';
          for (const item of document.querySelectorAll(".chat-item")) {
            item.addEventListener("click", () => (location.hash = `#/s/${SID}/c/${item.dataset.id}`));
            item.querySelector(".x").addEventListener("click", async (e) => {
              e.stopPropagation();
              if (!confirm("刪除這個聊天室與其對話記錄？")) return;
              await fetch(`/s/${SID}/chats/${item.dataset.id}`, { method: "DELETE" });
              loadChats();
            });
          }
        } catch {
          $("chatList").innerHTML = '<div style="color:var(--danger)">無法載入聊天室清單</div>';
        }
      }

      $("newChatBtn").addEventListener("click", async () => {
        const id = uuid();
        await fetch(`/s/${SID}/chats`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ id }),
        });
        location.hash = `#/s/${SID}/c/${id}`;
      });

      async function loadPapers() {
        try {
          const res = await fetch(`/s/${SID}/papers`);
          const data = await res.json();
          const papers = data.papers || [];
          $("paperCount").textContent = papers.length;
          $("papersGrid").innerHTML =
            papers
              .map(
                (p) => `
              <div class="card paper-card" data-file="${esc(p.file)}">
                <button class="del" title="刪除這篇論文">✕</button>
                <h3>${esc(p.title)}</h3>
                <div class="summary">${esc(p.summary || "（尚無摘要）")}</div>
                <div class="expand-hint">點擊展開/收合摘要</div>
              </div>`
              )
              .join("") ||
            '<div style="color:var(--muted);font-size:14px">這個 Session 還沒有論文，上傳第一篇吧。</div>';
          for (const card of document.querySelectorAll(".paper-card")) {
            card.addEventListener("click", () => card.classList.toggle("expanded"));
            card.querySelector(".del").addEventListener("click", async (e) => {
              e.stopPropagation();
              const file = card.dataset.file;
              if (!confirm(`確定要刪除「${card.querySelector("h3").textContent}」？無法復原。`)) return;
              try {
                const res = await fetch(`/s/${SID}/papers/` + encodeURIComponent(file), { method: "DELETE" });
                const out = await res.json();
                if (!res.ok) throw new Error(out.error || "delete failed");
                loadPapers();
              } catch (err) {
                alert("刪除失敗：" + err.message);
              }
            });
          }
        } catch {
          $("papersGrid").innerHTML = '<div style="color:var(--danger)">無法載入論文清單</div>';
        }
      }

      $("deleteSession").addEventListener("click", async () => {
        if (!confirm("確定刪除整個 Session？所有論文向量與聊天記錄都會移除，無法復原。")) return;
        try {
          const res = await fetch(`/s/${SID}`, { method: "DELETE" });
          if (!res.ok) throw new Error("delete failed");
          forgetSession(SID);
          location.hash = "#/";
        } catch (err) {
          alert("刪除失敗：" + err.message);
        }
      });

      // ---------- 上傳（XHR 進度條） ----------
      $("file").addEventListener("change", () => {
        const file = $("file").files[0];
        if (!file) return;
        const wrap = $("progressWrap"), fill = $("progressFill"),
              phase = $("progressPhase"), pct = $("progressPct"), result = $("uploadResult");
        wrap.style.display = "block";
        fill.classList.remove("indeterminate");
        fill.style.width = "0%";
        phase.textContent = "上傳中";
        pct.textContent = "0%";
        result.textContent = "";
        result.className = "";

        const fd = new FormData();
        fd.append("file", file);
        const xhr = new XMLHttpRequest();
        xhr.open("POST", `/s/${SID}/ingest`);
        xhr.upload.onprogress = (e) => {
          if (!e.lengthComputable) return;
          const p = Math.round((e.loaded / e.total) * 100);
          fill.style.width = p + "%";
          pct.textContent = p + "%";
          if (p >= 100) {
            phase.textContent = "解析與嵌入中…（生成摘要需要一點時間）";
            pct.textContent = "";
            fill.classList.add("indeterminate");
          }
        };
        xhr.onload = () => {
          wrap.style.display = "none";
          fill.classList.remove("indeterminate");
          try {
            const data = JSON.parse(xhr.responseText);
            if (xhr.status !== 200) throw new Error(data.error || "ingest failed");
            result.className = "ok";
            result.textContent = `✓ 已加入「${data.title}」（${data.added} 個片段）` +
              (data.summary ? `\n摘要：${data.summary.slice(0, 120)}…` : "");
            loadPapers();
          } catch (err) {
            result.className = "err";
            result.textContent = "✗ " + err.message;
          }
          $("file").value = "";
        };
        xhr.onerror = () => {
          wrap.style.display = "none";
          result.className = "err";
          result.textContent = "✗ 網路錯誤，請重試";
          $("file").value = "";
        };
        xhr.send(fd);
      });

      // ---------- 聊天室 ----------
      function addMessage(role, text, citations) {
        const empty = $("log").querySelector(".empty");
        if (empty) empty.remove();
        const wrap = document.createElement("div");
        wrap.className = "msg " + role;
        wrap.innerHTML = `<div class="role">${role === "user" ? "你" : "Agent"}</div><div class="bubble"></div>`;
        wrap.querySelector(".bubble").textContent = text;
        if (citations && citations.length) attachCitations(wrap, citations);
        $("log").appendChild(wrap);
        $("log").scrollTop = $("log").scrollHeight;
        return wrap;
      }
      function attachCitations(msgEl, citations) {
        const div = document.createElement("div");
        div.className = "cites";
        div.innerHTML = citations.map((c) => `<span class="cite">${esc(c.title)} · p.${c.page}</span>`).join("");
        msgEl.appendChild(div);
      }
      function showEmptyState() {
        $("log").innerHTML = `
          <div class="empty">
            問任何關於這個 Session 論文庫的問題，<br />回答會即時串流並附上出處（論文 + 頁碼）。
          </div>`;
      }

      async function enterChat() {
        $("backToSession").href = `#/s/${SID}`;
        $("log").innerHTML = "";
        try {
          const res = await fetch(`/s/${SID}/chats/${CHAT_ID}`);
          if (res.status === 404) {
            // 直接開網址進來的新聊天室 → 建立
            await fetch(`/s/${SID}/chats`, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ id: CHAT_ID }),
            });
            $("chatTitle").textContent = "新對話";
            showEmptyState();
            return;
          }
          const rec = await res.json();
          $("chatTitle").textContent = rec.title || "對話";
          if (!rec.messages || rec.messages.length === 0) showEmptyState();
          else for (const m of rec.messages) addMessage(m.role, m.content, m.citations);
        } catch {
          showEmptyState();
        }
        $("input").focus();
      }

      $("deleteChatBtn").addEventListener("click", async () => {
        if (!confirm("刪除這個聊天室與其對話記錄？")) return;
        await fetch(`/s/${SID}/chats/${CHAT_ID}`, { method: "DELETE" });
        location.hash = `#/s/${SID}`;
      });

      async function readSse(res, handlers) {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const events = buf.split("\n\n");
          buf = events.pop() || "";
          for (const evt of events) {
            let name = "message", data = "";
            for (const line of evt.split("\n")) {
              if (line.startsWith("event:")) name = line.slice(6).trim();
              else if (line.startsWith("data:")) data += line.slice(5).trim();
            }
            if (data && handlers[name]) handlers[name](JSON.parse(data));
          }
        }
      }

      $("chatForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = $("input").value.trim();
        if (!message) return;
        addMessage("user", message);
        $("input").value = "";
        $("send").disabled = true;

        const msgEl = addMessage("assistant", "");
        const bubble = msgEl.querySelector(".bubble");
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        bubble.appendChild(cursor);

        let answer = "";
        let citations = [];
        try {
          const res = await fetch(`/s/${SID}/chat`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ chatId: CHAT_ID, message }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || "request failed (" + res.status + ")");
          }
          await readSse(res, {
            meta: (d) => { citations = d.citations || []; },
            delta: (d) => {
              answer += d.text;
              bubble.textContent = stripMarkdown(answer);
              bubble.appendChild(cursor);
              $("log").scrollTop = $("log").scrollHeight;
            },
            error: (d) => { throw new Error(d.message || "stream error"); },
          });
          cursor.remove();
          bubble.textContent = stripMarkdown(answer) || "（沒有收到回答）";
          if (citations.length) attachCitations(msgEl, citations);
          if ($("chatTitle").textContent === "新對話") {
            $("chatTitle").textContent = message.slice(0, 30);
          }
        } catch (err) {
          cursor.remove();
          bubble.textContent = "錯誤：" + err.message;
        } finally {
          $("send").disabled = false;
          $("input").focus();
        }
      });

      $("input").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          $("chatForm").requestSubmit();
        }
      });

      // ---------- 啟動 ----------
      route();
    </script>
  </body>
</html>
