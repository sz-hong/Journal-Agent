<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paper Reading Agent</title>
    <style>
      :root {
        --bg: #f7f7f8; --panel: #ffffff; --ink: #1a1a1a; --muted: #6b7280;
        --border: #e5e7eb; --accent: #2563eb; --accent-ink: #ffffff;
        --user: #eef2ff; --cite: #f1f5f9;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f1115; --panel: #171a21; --ink: #e8eaed; --muted: #9aa0aa;
          --border: #2a2f3a; --accent: #3b82f6; --accent-ink: #ffffff;
          --user: #1e253a; --cite: #1b1f27;
        }
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
        background: var(--bg); color: var(--ink); height: 100vh; display: flex; }
      aside { width: 260px; background: var(--panel); border-right: 1px solid var(--border);
        padding: 16px; overflow-y: auto; flex-shrink: 0; }
      aside h1 { font-size: 15px; margin: 0 0 4px; }
      aside p.sub { font-size: 12px; color: var(--muted); margin: 0 0 16px; }
      aside h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 18px 0 8px; }
      .paper { font-size: 12.5px; padding: 7px 9px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; line-height: 1.35; }
      main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
      #log { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
      .msg { max-width: 760px; }
      .msg .role { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
      .bubble { padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); white-space: pre-wrap; line-height: 1.55; font-size: 14.5px; }
      .user .bubble { background: var(--user); align-self: flex-end; }
      .assistant .bubble { background: var(--panel); }
      .user { align-self: flex-end; }
      .cites { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
      .cite { font-size: 11.5px; background: var(--cite); border: 1px solid var(--border); border-radius: 999px; padding: 3px 9px; color: var(--muted); }
      form { border-top: 1px solid var(--border); padding: 14px 16px; display: flex; gap: 10px; background: var(--panel); }
      textarea { flex: 1; resize: none; font: inherit; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
        background: var(--bg); color: var(--ink); min-height: 44px; max-height: 160px; }
      button { font: inherit; font-weight: 600; border: none; border-radius: 10px; padding: 0 18px; background: var(--accent); color: var(--accent-ink); cursor: pointer; }
      button:disabled { opacity: .5; cursor: default; }
      .upload label { display: block; font-size: 12.5px; padding: 8px; border: 1px dashed var(--border); border-radius: 8px; text-align: center; cursor: pointer; color: var(--muted); }
      .upload input { display: none; }
      #uploadStatus { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 14px; }
      .empty { color: var(--muted); font-size: 14px; margin: auto; text-align: center; max-width: 420px; }
      code { background: var(--cite); padding: 1px 5px; border-radius: 5px; font-size: 12.5px; }
    </style>
  </head>
  <body>
    <aside>
      <h1>📄 Paper Reading Agent</h1>
      <p class="sub">Facial-recognition papers · OpenAI + Vectorize</p>

      <div class="upload">
        <h2>Add a paper</h2>
        <label>
          <span id="uploadLabel">選擇 PDF 上傳…</span>
          <input type="file" id="file" accept="application/pdf" />
        </label>
        <div id="uploadStatus"></div>
      </div>

      <h2>Indexed papers</h2>
      <div id="papers"></div>
    </aside>

    <main>
      <div id="log">
        <div class="empty">
          問任何關於這些論文的問題，例如：<br /><br />
          <code>EU AI Act 如何規範即時人臉辨識？</code><br /><br />
          <code>比較各篇論文對隱私與偏見的立場</code>
        </div>
      </div>
      <form id="chat">
        <textarea id="input" placeholder="輸入問題… (Enter 送出，Shift+Enter 換行)"></textarea>
        <button type="submit" id="send">送出</button>
      </form>
    </main>

    <script>
      const log = document.getElementById("log");
      const form = document.getElementById("chat");
      const input = document.getElementById("input");
      const send = document.getElementById("send");
      const papersEl = document.getElementById("papers");
      const fileInput = document.getElementById("file");
      const uploadStatus = document.getElementById("uploadStatus");
      const uploadLabel = document.getElementById("uploadLabel");

      let history = [];

      function esc(s) {
        return s.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      }

      function addMessage(role, text, citations) {
        const empty = log.querySelector(".empty");
        if (empty) empty.remove();
        const wrap = document.createElement("div");
        wrap.className = "msg " + role;
        const label = role === "user" ? "你" : "Agent";
        let citeHtml = "";
        if (citations && citations.length) {
          citeHtml =
            '<div class="cites">' +
            citations.map((c) => `<span class="cite">${esc(c.title)} · p.${c.page}</span>`).join("") +
            "</div>";
        }
        wrap.innerHTML =
          `<div class="role">${label}</div>` +
          `<div class="bubble">${esc(text)}</div>` +
          citeHtml;
        log.appendChild(wrap);
        log.scrollTop = log.scrollHeight;
        return wrap;
      }

      async function loadPapers() {
        try {
          const res = await fetch("/papers");
          const data = await res.json();
          papersEl.innerHTML =
            (data.papers || []).map((p) => `<div class="paper">${esc(p.title)}</div>`).join("") ||
            '<div class="paper" style="color:var(--muted)">尚未匯入任何論文</div>';
        } catch {
          papersEl.innerHTML = '<div class="paper">無法載入清單</div>';
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = input.value.trim();
        if (!message) return;
        addMessage("user", message);
        input.value = "";
        send.disabled = true;
        const pending = addMessage("assistant", "思考中…");
        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ message, history }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "request failed");
          pending.remove();
          addMessage("assistant", data.answer, data.citations);
          history.push({ role: "user", content: message });
          history.push({ role: "assistant", content: data.answer });
          history = history.slice(-8);
        } catch (err) {
          pending.querySelector(".bubble").textContent = "錯誤：" + err.message;
        } finally {
          send.disabled = false;
          input.focus();
        }
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          form.requestSubmit();
        }
      });

      fileInput.addEventListener("change", async () => {
        const file = fileInput.files[0];
        if (!file) return;
        uploadLabel.textContent = file.name;
        uploadStatus.textContent = "上傳與索引中…（大型 PDF 需要一點時間）";
        const fd = new FormData();
        fd.append("file", file);
        try {
          const res = await fetch("/ingest", { method: "POST", body: fd });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "ingest failed");
          uploadStatus.textContent = `已加入 ${data.added} 個片段：${data.title}`;
          loadPapers();
        } catch (err) {
          uploadStatus.textContent = "失敗：" + err.message;
        } finally {
          fileInput.value = "";
        }
      });

      loadPapers();
    </script>
  </body>
</html>
